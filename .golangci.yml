version: "2"

run:
  timeout: 10m
  tests: true

output:
  formats:
    text:
      path: stdout
      colors: true
      print-issued-lines: true
      print-linter-name: true

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - ship-status-dash

linters:
  default: none
  enable:
    - goconst
    - govet
    - ineffassign
    - misspell
    - nakedret
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    goconst:
      min-len: 3
      min-occurrences: 3
    lll:
      line-length: 120
    misspell:
      locale: US
    nakedret:
      max-func-lines: 30
    revive:
      min-confidence: 0
      severity: warning
    staticcheck:
      checks: ["all", "-ST1000"]
    unconvert:
      fast: false
    unparam:
      check-exported: false
    whitespace:
      multi-if: false
      multi-func: false
  exclusions:
    paths:
      - vendor
      - test/e2e
    rules:
      - path: _test\.go
        linters:
          - goconst
      - path: vendor
        text: ".*"
      - linters:
          - revive
        text: "exported (type|function|method|var|const) .* should have comment"
