components:
  - name: Prow
    description: Backbone of the CI system
    ship_team: TestPlatform
    slack_reporting:
      - channel: "#test-channel"
        severity: "Down"
    sub_components:
      - name: Tide
        description: Merges PRs
        requires_confirmation: true
        tags:
          - ci
          - pr-merging
      - name: Deck
        description: The frontend for Prow
        requires_confirmation: false
        tags:
          - frontend
      - name: Hook
        description: Webhook handler for Prow
        requires_confirmation: false
        tags:
          - ci
          - github
        monitoring:
          frequency: 5m
          component_monitor: "app-ci-component-monitor"
          auto_resolve: true
      - name: Plank
        description: Job execution controller for Prow
        requires_confirmation: false
        tags:
          - ci
          - jobs
        monitoring:
          frequency: 5m
          component_monitor: "app-ci-component-monitor"
          auto_resolve: false
    owners:
      - user: developer
      - user: editor
      - service_account: system:serviceaccount:ship-status:component-monitor
  - name: Downstream CI
    description: Downstream CI system
    ship_team: TestPlatform
    slack_reporting:
      - channel: "#test-channel"
        severity: "Down"
    sub_components:
      - name: Retester
        description: Retests failed jobs
        requires_confirmation: false
        tags:
          - ci
          - jobs
        monitoring:
          frequency: 5s
          component_monitor: "app-ci-component-monitor"
          auto_resolve: true
    owners:
      - user: developer
      - service_account: system:serviceaccount:ship-status:component-monitor
  - name: Build Farm
    description: Where the CI jobs are run
    ship_team: DPTP
    slack_reporting:
      - channel: "#ops-testplatform"
        severity: "Down"
    sub_components:
      - name: Build01
        description: AWS build farm cluster
        tags:
          - ci
          - jobs
          - aws
      - name: Build02
        description: GCP build farm cluster
        tags:
          - ci
          - jobs
          - gcp
    owners:
      - user: other-developer
  # Boskos is only used for config hot-reload / orphan outage e2e (developer-owned).
  - name: Boskos
    description: Resource leasing for CI workloads
    ship_team: DPTP
    slack_reporting:
      - channel: "#ops-testplatform"
        severity: "Down"
    sub_components:
      - name: Quota
        description: Quota state
        tags:
          - ci
          - jobs
      - name: Leases
        description: Lease broker
        tags:
          - ci
          - jobs
    owners:
      - user: developer
  # The Sippy component is used during the component monitor e2e tests
  - name: Sippy
    description: CI private investigator
    ship_team: TRT
    slack_reporting:
      - channel: "#trt-alert"
        severity: "Down"
    sub_components:
      - name: Sippy
        description: CI private investigator
        monitoring:
          frequency: 30s
          component_monitor: "e2e-component-monitor"
          auto_resolve: true
      - name: api
        description: API success rate
        monitoring:
          frequency: 10s
          component_monitor: "e2e-component-monitor"
          auto_resolve: true
      - name: data-load
        description: Data load
        monitoring:
          frequency: 10s
          component_monitor: "e2e-component-monitor"
          auto_resolve: true
      - name: sippy-chat
        description: Chat component for Sippy
        monitoring:
          auto_resolve: true
          component_monitor: e2e-component-monitor
          frequency: 10s
      - name: error-handling-test
        description: Test sub-component for error handling
        monitoring:
          frequency: 10s
          component_monitor: "e2e-component-monitor"
          auto_resolve: true
    owners:
      - user: developer
      - service_account: system:serviceaccount:ship-status:component-monitor
  # The Errata Reliability component is used during the systemd component monitor e2e tests
  - name: Errata Reliability
    description: Services maintained by the Errata Reliability Team
    ship_team: ERT
    sub_components:
      - name: systemd-test
        description: Systemd monitor e2e test sub-component
        monitoring:
          frequency: 10s
          component_monitor: "e2e-component-monitor"
          auto_resolve: true
    owners:
      - user: developer
      - service_account: system:serviceaccount:ship-status:component-monitor
tags:
  - name: CI
    description: "Core CI infrastructure components"
    color: "#673AB7"
  - name: PR-Merging
    description: "Components related to PR merging"
    color: "#4CAF50"
  - name: Frontend
    description: "Frontend user-facing components"
    color: "#FF9800"
  - name: GitHub
    description: "Components that interact with GitHub"
    color: "#2196F3"
  - name: Jobs
    description: "CI job execution components"
    color: "#9C27B0"
  - name: AWS
    description: "Components running on AWS infrastructure"
    color: "#FF5722"
  - name: GCP
    description: "Components running on GCP infrastructure"
    color: "#03A9F4"
